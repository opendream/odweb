# Serve the Astro static build with pretty-URL resolution.
# Astro emits dist/<path>/index.html; try_files resolves /path -> /path/ -> index.html.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Issue RELATIVE redirects (e.g. trailing-slash on directories) so the visitor's
    # host:port is preserved. Without this, nginx builds absolute redirects using its
    # internal listen port (80) and drops the published port (e.g. :4321 / proxied hosts).
    absolute_redirect off;
    port_in_redirect off;

    # Long-cache fingerprinted assets
    location /_astro/ {
        expires max;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Serve Astro's built 404 page on misses (Cloudflare Pages does this automatically;
    # this gives local parity).
    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_min_length 256;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain application/xml;
}
