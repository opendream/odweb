# Serve the Astro static build with pretty-URL resolution.
# Astro emits dist/<path>/index.html; try_files resolves /path -> /path/ -> index.html.
server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Long-cache fingerprinted assets
    location /_astro/ {
        expires max;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    gzip on;
    gzip_min_length 256;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain application/xml;
}
