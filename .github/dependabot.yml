version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      astro:
        patterns:
          - "astro"
          - "@astrojs/*"
      dev-tooling:
        patterns:
          - "vite"
          - "vitest"
          - "esbuild"
          - "turndown"
          - "node-html-parser"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
