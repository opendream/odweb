name: odweb-site

# Dockerized build + serve for the Astro static site (host needs only Docker).
#   docker compose up -d --build           # build dist in Docker, serve at localhost:4321
#   docker compose up -d --build web        # rebuild after content/code changes
# Re-extract content from the local WordPress (REST must be enabled on the local stack):
#   (in ../local) wp plugin deactivate disable-json-api
#   docker compose --profile tools run --rm extract
#   (in ../local) wp plugin activate disable-json-api
#   then rebuild:  docker compose up -d --build web

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: odweb-site
    ports:
      - "4321:80"
    restart: unless-stopped

  # One-off: regenerate src/content/posts + public/media from local WP REST.
  # node_modules lives in a named volume so the host stays clean.
  extract:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - extract_modules:/app/node_modules
    environment:
      - WP_BASE=http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: sh -c "npm install --no-save turndown@^7.2.0 >/dev/null 2>&1 && node scripts/extract.mjs"
    profiles: ["tools"]

  # One-off: scrape designed pages (home, etc.) from local WP render → HTML + CSS + assets.
  #   docker compose --profile tools run --rm extract-pages
  # Joins odweb-local_default so it can reach the WP nginx container directly.
  # socat proxies localhost:8080 → WP container port 80 so WP's canonical-URL redirects
  # resolve correctly (WP_HOME=http://localhost:8080, node fetch follows redirects normally).
  extract-pages:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - extract_modules:/app/node_modules
    environment:
      - WP_BASE=http://localhost:8080
    networks:
      - default
      - odweb-local_default
    command: >
      sh -c "apk add socat -q &&
             socat TCP-LISTEN:8080,fork,reuseaddr TCP:web:80 &
             npm install --no-save node-html-parser@^6.1.13 turndown@^7.2.0 >/dev/null 2>&1 &&
             node scripts/extract-pages.mjs"
    profiles: ["tools"]

  # One-off: run the pipeline unit tests (Vitest) in a container.
  #   docker compose --profile tools run --rm test
  test:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - extract_modules:/app/node_modules
    command: sh -c "npm install --no-save turndown@^7.2.0 vitest@^2.1.0 node-html-parser@^6.1.13 >/dev/null 2>&1 && npx vitest run scripts/lib/"
    profiles: ["tools"]

volumes:
  extract_modules:

networks:
  odweb-local_default:
    external: true
